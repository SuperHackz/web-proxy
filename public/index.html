<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Proxy GUI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #htmlViewer {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Web Proxy GUI</h1>
  <p>Enter a URL to fetch via the proxy:</p>
  <input type="text" id="urlInput" placeholder="https://example.com" />
  <button onclick="fetchViaProxy()">Fetch</button>

  <h2>Raw Result:</h2>
  <pre id="result">Nothing yet...</pre>

  <h2>Rendered HTML View (with JS):</h2>
  <iframe id="htmlViewer"></iframe>

  <script>
    async function fetchViaProxy() {
      const url = document.getElementById('urlInput').value;
      const resultEl = document.getElementById('result');
      const iframe = document.getElementById('htmlViewer');

      // Clear previous content
      iframe.srcdoc = '';
      resultEl.textContent = 'Fetching...';

      try {
        const response = await fetch(`/api/proxy?url=${encodeURIComponent(url)}`);
        const contentType = response.headers.get("content-type");

        if (contentType && contentType.includes("application/json")) {
          const data = await response.json();
          resultEl.textContent = JSON.stringify(data, null, 2);
          iframe.srcdoc = '';  // Clear HTML viewer
        } else {
          const text = await response.text();
          resultEl.textContent = text;

          // Directly set the iframe to load the content and execute JS
          if (contentType && contentType.includes("text/html")) {
            iframe.src = url;  // Load the page and run the JavaScript

            // After the iframe has loaded the content, we modify links inside it
            iframe.onload = () => {
              const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

              // Intercept all link clicks
              const links = iframeDoc.querySelectorAll('a');
              links.forEach(link => {
                link.addEventListener('click', function(event) {
                  event.preventDefault(); // Prevent the default link behavior
                  const newUrl = this.href;
                  console.log(`Opening link: ${newUrl}`);

                  // Optionally update iframe content to load the new link
                  iframe.src = newUrl;
                });
              });
            };
          } else {
            iframe.srcdoc = `<pre>${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>`;
          }
        }
      } catch (err) {
        resultEl.textContent = "Error: " + err.message;
        iframe.srcdoc = ''; // Clear iframe content on error
      }
    }
  </script>
</body>
</html>
